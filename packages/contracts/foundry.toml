[profile.default]
src = "."
test = "test"
out = "out"
cache_path = "cache_forge"
libs = ["lib", "../../node_modules"]
remappings = [
    "@openzeppelin/=../../node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/",
]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
