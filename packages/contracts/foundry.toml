[profile.default]
src = "."
test = "test"
out = "out"
cache_path = "cache_forge"
libs = ["lib", "../../node_modules"]
remappings = [
    "@openzeppelin/=../../node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/",
]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

additional_compiler_profiles = [{ name = "via-ir", via_ir = true, optimizer = true, optimizer_runs = 200 }]

compilation_restrictions = [
    { paths = "payments/AntseedChannels.sol", via_ir = true },
    { paths = "script/*.sol", via_ir = true },
]

[profile.usage-accounting]
src = "test/emissions"
test = "test/emissions"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
