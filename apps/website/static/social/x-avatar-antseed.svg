<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">AntSeed X profile image</title>
  <desc id="desc">Dark soil square with a glowing AntSeed green ant mark, built to survive X circular cropping.</desc>
  <defs>
    <radialGradient id="greenGlow" cx="35%" cy="28%" r="72%">
      <stop offset="0" stop-color="#1FD87A" stop-opacity="0.34"/>
      <stop offset="0.44" stop-color="#1FD87A" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#070b09" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clayGlow" cx="76%" cy="76%" r="36%">
      <stop offset="0" stop-color="#e8a33d" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e8a33d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b09"/>
      <stop offset="0.55" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#070b09"/>
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#97ffc7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="antGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.121 0 0 0 0 0.847 0 0 0 0 0.478 0 0 0 .85 0" result="green"/>
      <feMerge><feMergeNode in="green"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded"><rect width="1200" height="1200" rx="128"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="1200" height="1200" fill="url(#soil)"/>
    <rect width="1200" height="1200" fill="url(#greenGlow)"/>
    <rect width="1200" height="1200" fill="url(#clayGlow)"/>
    <rect width="1200" height="1200" fill="url(#grid)"/>
    <circle cx="600" cy="600" r="478" fill="none" stroke="#97ffc7" stroke-opacity="0.18" stroke-width="4"/>
    <circle cx="600" cy="600" r="405" fill="none" stroke="#1FD87A" stroke-opacity="0.22" stroke-width="3"/>
    <path d="M180 610c110-42 187-34 278 0s179 35 276-4 189-37 286 8" fill="none" stroke="#97ffc7" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 40"/>
    <g filter="url(#antGlow)" transform="translate(600 592) scale(7.7)">
      <g stroke="#1FD87A" stroke-width="2.8" stroke-linecap="round">
        <path d="M-3-23L-14-38"/><path d="M3-23L14-38"/>
        <path d="M-7-6L-28-18"/><path d="M7-6L28-18"/>
        <path d="M-8 8L-33 11"/><path d="M8 8L33 11"/>
        <path d="M-7 27L-30 39"/><path d="M7 27L30 39"/>
      </g>
      <g fill="#1FD87A">
        <circle cx="-14" cy="-38" r="2.9"/><circle cx="14" cy="-38" r="2.9"/>
        <circle cx="-28" cy="-18" r="2.9"/><circle cx="28" cy="-18" r="2.9"/>
        <circle cx="-33" cy="11" r="2.9"/><circle cx="33" cy="11" r="2.9"/>
        <circle cx="-30" cy="39" r="2.9"/><circle cx="30" cy="39" r="2.9"/>
        <ellipse cx="0" cy="-22.5" rx="8" ry="8.5"/>
        <ellipse cx="0" cy="0" rx="11" ry="12"/>
        <ellipse cx="0" cy="29" rx="15" ry="19"/>
      </g>
    </g>
    <circle cx="922" cy="884" r="16" fill="#e8a33d"/>
    <circle cx="922" cy="884" r="62" fill="none" stroke="#e8a33d" stroke-opacity="0.18" stroke-width="3"/>
  </g>
</svg>
