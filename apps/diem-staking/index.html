<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Mirrors antseed.com's final rendered metadata. Docusaurus composes
         title as "{tagline} | {title}", twitter:title as just the tagline,
         and description as "{tagline} {description}". We follow the same
         shape here, swapping `| AntSeed` for `| AntSeed DIEM Capacity` on the
         full title and prepending the DIEM-specific purpose to descriptions.
         Only DIEM-focused fields differ from antseed.com — everything else
         (keywords, og:type, images, favicon, fonts) is identical. -->

    <title>DIEM Provider Capacity Program | AntSeed</title>
    <meta
      name="description"
      content="Lock DIEM to participate in provider capacity on AntSeed. USDC allocations and $ANTS incentives are variable, subject to Program rules, and not guaranteed."
    />
    <link rel="canonical" href="https://diem.antseed.com/" />

    <!-- Same favicon as antseed.com (the AntSeed ant) so users see one brand. -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('diem-theme-mode') === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>

    <!-- Fonts — AntSeed Sci-Fi Soft brand pair. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap"
    />

    <!-- Keywords + social — identical to the website's metadata array. -->
    <meta
      name="keywords"
      content="AI marketplace, OpenRouter alternative, serving AI inference, consuming AI inference, peer-to-peer AI, decentralized AI inference, anonymous AI, private AI, P2P AI, AI economy"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://antseed.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://antseed.com/og-image.jpg" />

    <!-- DIEM-focused title/description pair for og + twitter. og:title
         mirrors <title> (Docusaurus uses the same suffix on both);
         twitter:title drops the brand suffix (Docusaurus's convention) but
         keeps a page-identifier so social unfurls still convey context. -->
    <meta property="og:title" content="DIEM Provider Capacity Program | AntSeed" />
    <meta
      property="og:description"
      content="Lock DIEM to participate in provider capacity on AntSeed. USDC allocations and $ANTS incentives are variable, subject to Program rules, and not guaranteed."
    />
    <meta name="twitter:title" content="DIEM Provider Capacity Program | AntSeed" />
    <meta
      name="twitter:description"
      content="Lock DIEM to participate in provider capacity on AntSeed. USDC allocations and $ANTS incentives are variable, subject to Program rules, and not guaranteed."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
